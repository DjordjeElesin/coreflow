name: Setup
description: Setup Node.js and install dependencies with Yarn cache

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: "22"
        cache: yarn
    - name: Install dependencies
      shell: bash
      run: corepack enable && yarn install --frozen-lockfile --non-interactive
